<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento scroll</title>
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/pag_5.css">
</head>

<body>
    <div class="container">
        <h1>Evento: scroll</h1>
        <p>Desplázate dentro del recuadro gris para ver la posición del scroll</p>
        <div class="demo-area">
            <div id="cajaScroll" class="scroll-box">
                <!-- Contenido largo para generar scroll -->
                <p>Línea 1</p>
                <p>Línea 2</p>
                <p>Línea 3</p>
                <p>Línea 4</p>
                <p>Línea 5</p>
                <p>Línea 6</p>
                <p>Línea 7</p>
                <p>Línea 8</p>
                <p>Línea 9</p>
                <p>Línea 10</p>
                <p>Línea 11</p>
                <p>Línea 12</p>
                <p>Más texto para hacer scroll...</p>
            </div>
            <p><strong>Posición scroll vertical:</strong> <span id="scrollPos">0</span> px</p>
        </div>
        <div class="volver">
            <a href="/" class="btn">← Volver al índice</a>
        </div>
    </div>
    <script type="module" src="/scripts/pag_5.js"></script>
</body>

</html>
