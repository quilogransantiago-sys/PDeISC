<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 6 - Formulario de registro</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="container">
        <h1>📝 Formulario de registro</h1>
        <p>Complete todos los campos (los obligatorios están marcados).</p>

        <form id="registroForm" class="form-registro">
            <!-- Texto (nombre) -->
            <div class="campo">
                <label for="nombre">Nombre completo: *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <!-- Radio (sexo) -->
            <div class="campo">
                <label>Sexo: *</label>
                <div class="radio-group">
                    <label><input type="radio" name="sexo" value="Masculino" required> Masculino</label>
                    <label><input type="radio" name="sexo" value="Femenino"> Femenino</label>
                    <label><input type="radio" name="sexo" value="Otro"> Otro</label>
                </div>
            </div>

            <!-- Select (país) -->
            <div class="campo">
                <label for="pais">País: *</label>
                <select id="pais" name="pais" required>
                    <option value="">Seleccione...</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Chile">Chile</option>
                    <option value="Uruguay">Uruguay</option>
                    <option value="Brasil">Brasil</option>
                    <option value="España">España</option>
                </select>
            </div>

            <!-- Checkbox (intereses) -->
            <div class="campo">
                <label>Intereses (puede elegir varios):</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="intereses" value="Deportes"> Deportes</label>
                    <label><input type="checkbox" name="intereses" value="Música"> Música</label>
                    <label><input type="checkbox" name="intereses" value="Tecnología"> Tecnología</label>
                    <label><input type="checkbox" name="intereses" value="Viajes"> Viajes</label>
                </div>
            </div>

            <!-- Number (edad) -->
            <div class="campo">
                <label for="edad">Edad: *</label>
                <input type="number" id="edad" name="edad" min="1" max="120" required>
            </div>

            <!-- Email -->
            <div class="campo">
                <label for="email">Correo electrónico: *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="botones">
                <button type="submit">Enviar registro</button>
                <button type="reset" class="reset">Limpiar formulario</button>
            </div>
        </form>

        <div id="resultadoPanel" class="resultado-panel" style="display: none;">
            <h2>✅ Datos registrados</h2>
            <div id="datosMostrados" class="datos-mostrados"></div>
            <button id="btnCerrarResultado" class="cerrar-btn">Cerrar vista</button>
        </div>

        <div class="volver">
            <a href="/" class="btn">Reiniciar (recargar página)</a>
        </div>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
