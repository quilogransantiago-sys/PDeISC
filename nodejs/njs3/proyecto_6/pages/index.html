<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABM - Registro de Personas</title>
    <script>
        (function () {
            const temaGuardado = localStorage.getItem('tema');
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const temaActivo = temaGuardado || (prefiereOscuro ? 'oscuro' : 'claro');
            document.documentElement.setAttribute('data-tema', temaActivo);
        })();
    </script>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="contenedor-principal">
        <header class="encabezado">
            <h1>Gestión de Registros (ABM)</h1>
            <button id="btnModoOscuro" class="btn-tema">🌙 Modo oscuro</button>
        </header>

        <div id="panelMensajes" class="panel-mensajes"></div>

        <!-- Contenedor con dos secciones: formulario y listado (horizontal en desktop) -->
        <div class="contenedor-doble">
            <!-- Sección formulario -->
            <div class="seccion-formulario">
                <h2>Formulario de registro</h2>
                <form id="formRegistro">
                    <!-- Campo texto -->
                    <div class="campo">
                        <label for="nombreCompleto">Nombre completo:</label>
                        <input type="text" id="nombreCompleto" name="nombreCompleto" required
                            placeholder="Ej: Juan Pérez">
                        <span class="error" id="errorNombre"></span>
                    </div>

                    <!-- Campo email -->
                    <div class="campo">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@dominio.com">
                        <span class="error" id="errorEmail"></span>
                    </div>

                    <!-- Campo number (edad) -->
                    <div class="campo">
                        <label for="edad">Edad:</label>
                        <input type="number" id="edad" name="edad" min="0" max="120" required>
                        <span class="error" id="errorEdad"></span>
                    </div>

                    <!-- Radio (género) -->
                    <div class="campo">
                        <label>Género:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="genero" value="masculino" required> Masculino</label>
                            <label><input type="radio" name="genero" value="femenino"> Femenino</label>
                            <label><input type="radio" name="genero" value="otro"> Otro</label>
                        </div>
                        <span class="error" id="errorGenero"></span>
                    </div>

                    <!-- Select (país) -->
                    <div class="campo">
                        <label for="pais">País:</label>
                        <select id="pais" name="pais" required>
                            <option value="">Seleccione...</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Chile">Chile</option>
                            <option value="Uruguay">Uruguay</option>
                            <option value="Brasil">Brasil</option>
                            <option value="Colombia">Colombia</option>
                        </select>
                        <span class="error" id="errorPais"></span>
                    </div>

                    <!-- Checkbox (intereses) -->
                    <div class="campo">
                        <label>Intereses:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="intereses" value="deporte"> Deporte</label>
                            <label><input type="checkbox" name="intereses" value="cultura"> Cultura</label>
                            <label><input type="checkbox" name="intereses" value="tecnologia"> Tecnología</label>
                            <label><input type="checkbox" name="intereses" value="ciencia"> Ciencia</label>
                        </div>
                    </div>

                    <!-- Campos ocultos para ID en edición -->
                    <input type="hidden" id="registroId" value="">

                    <div class="botones-form">
                        <button type="submit" class="btn btn-primario">Guardar registro</button>
                        <button type="button" id="btnCancelar" class="btn btn-secundario" style="display:none;">Cancelar
                            edición</button>
                    </div>
                </form>
            </div>

            <!-- Sección listado (con scroll) -->
            <div class="seccion-listado">
                <h2>Lista de registros</h2>
                <div id="contenedorLista" class="contenedor-lista">
                    <!-- Aquí se mostrarán los registros -->
                    <p class="texto-vacio">No hay registros. Complete el formulario para agregar.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
