<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de nodos &lt;a&gt;</title>
    <!-- Prevenir flash modo oscuro -->
    <script>
        (function () {
            const temaGuardado = localStorage.getItem('tema');
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const temaActivo = temaGuardado || (prefiereOscuro ? 'oscuro' : 'claro');
            document.documentElement.setAttribute('data-tema', temaActivo);
        })();
    </script>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="contenedor-principal">
        <header class="encabezado">
            <h1>Gestión de enlaces (nodos &lt;a&gt;)</h1>
            <button id="btnModoOscuro" class="btn-tema">🌙 Modo oscuro</button>
        </header>

        <div id="panelMensajes" class="panel-mensajes"></div>

        <div class="seccion-acciones">
            <button id="btnAgregarEnlace" class="btn btn-primario">➕ Agregar nuevo enlace</button>
        </div>

        <div class="seccion-lista">
            <h2>Lista de enlaces</h2>
            <div id="contenedorEnlaces" class="lista-enlaces"></div>
        </div>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
