<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>innerHTML - Constructor de objetos HTML</title>
    <script>
        (function () {
            const temaGuardado = localStorage.getItem('tema');
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const temaActivo = temaGuardado || (prefiereOscuro ? 'oscuro' : 'claro');
            document.documentElement.setAttribute('data-tema', temaActivo);
        })();
    </script>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="contenedor-principal">
        <header class="encabezado">
            <h1>Constructor de objetos HTML con innerHTML</h1>
            <button id="btnModoOscuro" class="btn-tema">🌙 Modo oscuro</button>
        </header>

        <div id="panelMensajes" class="panel-mensajes"></div>

        <!-- Este div permite que los dos contenedores estén lado a lado en desktop -->
        <div class="contenedor-doble">
            <div class="seccion-botones">
                <button data-tipo="parrafo" class="btn btn-agregar">➕ Agregar párrafo</button>
                <button data-tipo="imagen" class="btn btn-agregar">🖼️ Agregar imagen</button>
                <button data-tipo="lista" class="btn btn-agregar">📋 Agregar lista</button>
                <button data-tipo="tabla" class="btn btn-agregar">📊 Agregar tabla</button>
                <button data-tipo="video" class="btn btn-agregar">🎬 Agregar video</button>
                <button id="btnLimpiar" class="btn btn-secundario">🗑️ Limpiar todo</button>
            </div>

            <div class="seccion-vista-previa">
                <h2>Área de visualización</h2>
                <div id="contenedorObjetos" class="contenedor-objetos">
                    <!-- Los objetos HTML se agregan aquí -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
