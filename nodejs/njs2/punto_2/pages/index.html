<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP + FS - Componente</title>
    <link rel="stylesheet" href="/styles/style.css">
    <script>
        // Anti-flash para modo oscuro
        (function () {
            const oscuro = localStorage.getItem('darkMode') === 'true';
            if (oscuro) document.documentElement.classList.add('dark');
        })();
    </script>
</head>

<body>
    <header>
        <h1>Servidor HTTP + File System</h1>
        <button id="tema-btn">Cambiar tema</button>
    </header>
    <main>
        <section class="tarjeta">
            <h2>Módulo HTTP</h2>
            <p>Servidor nativo que maneja peticiones y responde con archivos estáticos.</p>
            <span class="etiqueta">http.createServer</span>
        </section>
        <section class="tarjeta">
            <h2>Módulo FS</h2>
            <p>Lee archivos del sistema con <code>fs.readFile</code> y los envía al cliente.</p>
            <span class="etiqueta">fs.readFile</span>
        </section>
    </main>
    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
