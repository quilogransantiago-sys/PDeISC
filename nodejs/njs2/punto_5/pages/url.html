<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de URL</title>
    <script>
        (function () {
            const tema = localStorage.getItem('tema');
            const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (tema === 'oscuro' || (tema === null && prefiereOscuro)) {
                document.documentElement.classList.add('modo-oscuro');
            }
        })();
    </script>
    <link rel="stylesheet" href="/styles/main.css">
    <script type="module" src="/scripts/main.js"></script>
</head>

<body>
    <div class="contenedor">
        <header class="encabezado">
            <div class="logo-titulo">
                <h1>Analizador de URL (módulo URL)</h1>
                <button id="btn-tema" class="btn-tema">Modo oscuro</button>
            </div>
        </header>
        <main class="principal">
            <section class="tarjeta">
                <h2>Ingrese una URL</h2>
                <input type="text" id="url-input" placeholder="https://ejemplo.com:8080/path?clave=valor#seccion"
                    class="campo">
                <button id="analizar-btn" class="btn-primario">Analizar</button>
                <div id="resultado-url" class="resultado"></div>
            </section>
        </main>
        <footer class="pie">
            <p>Envía la URL al servidor que usa el módulo nativo 'url' de Node.js</p>
        </footer>
    </div>
    <script type="module">
        const input = document.getElementById('url-input');
        const btn = document.getElementById('analizar-btn');
        const resultadoDiv = document.getElementById('resultado-url');

        btn.addEventListener('click', async () => {
            const urlString = input.value.trim();
            if (!urlString) {
                resultadoDiv.innerHTML = '<p class="error">Por favor ingrese una URL.</p>';
                return;
            }
            try {
                const respuesta = await fetch('/api/analizar-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urlString })
                });
                const datos = await respuesta.json();
                if (datos.error) {
                    resultadoDiv.innerHTML = `<p class="error">${datos.error}</p>`;
                } else {
                    resultadoDiv.innerHTML = `
            <h3>Componentes:</h3>
            <ul>
              <li><strong>Protocolo:</strong> ${datos.protocolo}</li>
              <li><strong>Host:</strong> ${datos.host}</li>
              <li><strong>Hostname:</strong> ${datos.hostname}</li>
              <li><strong>Puerto:</strong> ${datos.puerto}</li>
              <li><strong>Path:</strong> ${datos.path}</li>
              <li><strong>Query:</strong> ${JSON.stringify(datos.query)}</li>
              <li><strong>Fragmento:</strong> ${datos.fragmento}</li>
              <li><strong>HREF:</strong> ${datos.href}</li>
            </ul>
          `;
                }
            } catch (err) {
                resultadoDiv.innerHTML = '<p class="error">Error de conexión.</p>';
            }
        });
    </script>
</body>

</html>
