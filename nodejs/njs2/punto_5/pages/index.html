<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Menú Hamburguesa</title>
    <link rel="stylesheet" href="/styles/style.css">
    <script>
        // Anti-flash para modo oscuro
        (function () {
            const oscuro = localStorage.getItem('darkMode') === 'true';
            if (oscuro) document.documentElement.classList.add('dark');
        })();
    </script>
</head>

<body>
    <header>
        <h1>Punto 5</h1>
        <button id="tema-btn">Tema</button>
        <div id="menu-container"></div>
    </header>
    <main>
        <section>
            <h2>Bienvenido</h2>
            <p>Este sitio demuestra un menú hamburguesa modular, modo oscuro y 5 páginas.</p>
            <span class="etiqueta">Inicio</span>
        </section>
        <section>
            <h2>Contenido</h2>
            <p>Explora las secciones: Calculadora, Clima, Demo de Módulos y Contacto.</p>
        </section>
    </main>
    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
