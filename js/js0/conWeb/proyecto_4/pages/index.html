<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Método shift() - Chat y Cola</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="container">
        <h1> <code>shift()</code> en acción</h1>
        <p><strong>shift()</strong> elimina el <strong>primer elemento</strong> de un array y lo devuelve.</p>

        <!-- 
      EJERCICIO 1: Números simples
      Este es el más básico, solo muestra el array en texto.
    -->
        <section class="card">
            <h2> 1. Quitar primer número</h2>
            <div class="array-box">
                <span id="numerosArray" class="array-display">[10, 20, 30, 40, 50]</span>
            </div>
            <button id="shiftNumeroBtn">🗑️ Eliminar primero con shift()</button>
            <div id="numeroMensaje" class="mensaje"></div>
        </section>

        <!-- 
      EJERCICIO 2: Chat con burbujas
      Es más visual: los mensajes aparecen como en WhatsApp.
      Cuando se elimina el primero, la burbuja se va volando.
    -->
        <section class="card chat-card">
            <h2> 2. Chat</h2>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <!-- Acá JavaScript va a crear las burbujas -->
                </div>
                <div class="chat-control">
                    <button id="shiftChatBtn" class="chat-btn"> Eliminar mensaje más antiguo (shift)</button>
                </div>
                <div id="chatMensaje" class="mensaje"></div>
            </div>
        </section>

        <!-- 
      EJERCICIO 3: Cola de atención al cliente
      Los clientes se muestran como tarjetitas con ticket.
      Atender al primero = shift(), la tarjeta desaparece con animación.
    -->
        <section class="card queue-card">
            <h2> 3. Cola de atención al cliente</h2>
            <div class="queue-container">
                <div class="queue-list" id="queueList">
                    <!-- Acá JavaScript muestra los clientes -->
                </div>
                <button id="atenderBtn" class="attend-btn"> Atender al primer cliente (shift)</button>
                <div id="colaMensaje" class="mensaje"></div>
            </div>
        </section>
        <script type="module" src="/scripts/main.js"></script>
</body>

</html>
