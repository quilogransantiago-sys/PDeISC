<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Método push() - Ejercicios</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>

<body>
    <div class="container">
        <h1>Demostración del método <code>push()</code></h1>
        <p>Agrega elementos a arrays</p>

        <!-- EJERCICIO 1: FRUTAS -->
        <section class="card" id="ejercicio1">
            <h2>1. Array de frutas</h2>
            <p>Array actual: <strong id="frutasArray">[]</strong></p>
            <div class="input-group">
                <input type="text" id="frutaInput" placeholder="Ej: manzana, pera, fresa" autocomplete="off">
                <button id="agregarFrutaBtn">Agregar fruta con push()</button>
            </div>
            <div id="frutaMensaje" class="mensaje"></div>
        </section>

        <!-- EJERCICIO 2: AMIGOS -->
        <section class="card" id="ejercicio2">
            <h2>2. Lista de amigos</h2>
            <p>Array actual: <strong id="amigosArray">[]</strong></p>
            <div class="input-group">
                <input type="text" id="amigoInput" placeholder="Nombre de tu amigo" autocomplete="off">
                <button id="agregarAmigoBtn">Agregar amigo con push()</button>
            </div>
            <div id="amigoMensaje" class="mensaje"></div>
        </section>

        <!-- EJERCICIO 3: NÚMEROS (mayor que el último) -->
        <section class="card" id="ejercicio3">
            <h2>3. Números condicionales</h2>
            <p>Array inicial: <strong id="numerosArray">[5, 12, 8]</strong></p>
            <p><small>⚠️ Solo se agregará si el nuevo número es <strong>mayor</strong> que el último (<span
                        id="ultimoNumero">8</span>)</small></p>
            <div class="input-group">
                <input type="number" id="numeroInput" placeholder="Ingresa un número" step="any">
                <button id="agregarNumeroBtn">Agregar número con push()</button>
            </div>
            <div id="numeroMensaje" class="mensaje"></div>
        </section>
    </div>

    <script type="module" src="/scripts/main.js"></script>
</body>

</html>
